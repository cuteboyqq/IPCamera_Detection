GENERATE_LABEL_TASK:
  TASK_COCO_DETECTION: False   # Generate detection labels from COCO2017 dataset only
  TASK_FACE_DETECTION: False   # Generate detection labels from face dataset only
  TASK_POSE_DETECTION: False   # Generate pose (keypoint) detection labels only
  TASK_MULTI_DETECTION: True   # Enable multi-task labeling (merge COCO, face, pose)

MD_ENABLE_LABEL:
  COCO2017: True   # Use COCO2017 labels in multi-task mode
  FACE: True       # Use face labels in multi-task mode
  POSE: True       # Use pose labels in multi-task mode

CONFIDENCE_THRESHOLD:
  COCO2017: 0.50
  FACE: 0.25
  POSE: 0.50

LABEL_VALUE:
  FACE: 10   # Category index assigned for face labels (after COCO classes)
  POSE: 0    # Category index for pose labels (0 if starting from scratch)

MODEL:
  DETECT_MODEL: yolo11x.pt       # Pretrained detection model for COCO2017 objects
  FACE_MODEL: yolov11l-face.pt   # Pretrained face detection model
  POSE_MODEL: yolo11x-pose.pt    # Pretrained pose (keypoint) detection model

VISUALIZE:
  SHOW_RESULT_IM: False   # Display images with bounding boxes/keypoints during processing

DATA:
  DATA_NUM: 100000   # Maximum number of images to process
  DATA_DIR: "/home/ali/Projects/datasets/coco2017-ashacam-part12"   # Root dataset directory
  DATA_TYPE: ""      # Data split type, e.g., 'train', 'val', or "" for default
  DATA_IMG_DIR: "/home/ali/Projects/datasets/coco2017-ashacam-part12/images/train2017"   # Source images
  DATA_SAVE_DETECT_TXT_DIR: "/home/ali/Projects/datasets/coco2017-ashacam-part12/labels/detection/train2017-80cls"   # Save detection labels
  DATA_SAVE_POSE_TXT_DIR: "/home/ali/Projects/datasets/coco2017-ashacam-part12/labels/lane/points/train2017-80cls"   # Save pose labels

SAVE:
  RESULT_IMAGE: True   # Save images with visualized results
  RESULT_IM_RESOLUTION: [720,1280]   # Resolution [height, width] for saved images
  RESULT_MAPPING_IMAGE: True  # Save mapping images with visualized results

MAPPING:
  ENABLE: True   # Apply class remapping
  INPUT_LABEL_DIR: "/home/ali/Projects/datasets/coco2017-ashacam-part12/labels/detection/train2017-80cls"   # Original labels
  OUTPUT_LABEL_DIR: "/home/ali/Projects/datasets/coco2017-ashacam-part12/labels/detection/train2017-10cls"   # Remapped labels
  LABEL_MAPPING: {0: 0, 2: 1, 1: 2, 3: 3, 7: 4, 5: 5, 56: 6, 16: 7, 24: 8, 15: 9, 80: 10}   # Original ID → new ID
  MAPPING_LABEL_NAME: ["person", "car", "bicycle", "motorcycle", "truck", "bus", "chair", "dog", "backpack", "cat", "face"]


